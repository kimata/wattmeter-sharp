serial:
    port: /dev/ttyUSB0

fluentd:
    host: proxy.green-rabbit.net
    data:
        tag: hems
        label: sharp
        field: power

influxdb:
    url: http://proxy.green-rabbit.net:8086
    token: YOUR_INFLUXDB_TOKEN
    org: home
    bucket: sensor

device:
    define: device.example.yaml
    cache: data/dev_id.dat

# 電力に掛ける補正倍率 (省略時は 1.5)。
# device.yaml で「scale:」を指定するとデバイス毎に上書きできます。
sensor:
    watt_scale: 1.5

metrics:
    data: data/metrics.db

webapp:
    timezone:
        offset: "+9"
        name: JST
        zone: Asia/Tokyo

    static_dir_path: frontend/dist

liveness:
    file:
        measure: /dev/shm/healthz
